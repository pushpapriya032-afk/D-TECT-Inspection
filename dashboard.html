<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>D - TECT — Logs Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#0f172a; --panel:linear-gradient(180deg,rgba(255,255,255,0.02),transparent);
      --accent:#00d4ff; --muted:rgba(255,255,255,0.6);
    }
    html,body{height:100%;margin:0;background:var(--bg);color:#e6f7ff;font-family:"Poppins",system-ui,Arial}
    .wrap{max-width:1200px;margin:18px auto;padding:20px}
    header{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px}
    header h1{margin:0;color:#7be0ff}
    .controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    input,select{background:transparent;border:1px solid rgba(255,255,255,0.06);color:inherit;padding:8px;border-radius:8px}
    button.btn{background:transparent;border:1px solid rgba(255,255,255,0.06);color:inherit;padding:8px 12px;border-radius:8px;cursor:pointer}
    button.btn.primary{background:linear-gradient(90deg,var(--accent),#3aa0ff);border:0;color:#021123}
    .layout{display:grid;grid-template-columns:1fr 420px;gap:16px}
    .panel{background:var(--panel);padding:12px;border-radius:10px;border:1px solid rgba(255,255,255,0.03)}
    #tbl{width:100%;border-collapse:collapse;margin-top:8px}
    th,td{padding:8px;border-bottom:1px solid rgba(255,255,255,0.03);font-size:13px;text-align:left}
    th{background:rgba(255,255,255,0.02)}
    .muted{color:var(--muted);font-size:13px}
    .small{font-size:12px;color:var(--muted)}
    .thumb{width:80px;height:48px;object-fit:cover;border-radius:6px;border:1px solid rgba(255,255,255,0.04)}
    .pagination{display:flex;gap:6px;align-items:center}
    .toast-wrap{position:fixed;right:18px;bottom:18px;display:flex;flex-direction:column-reverse;gap:8px;z-index:9999}
    .toast{background:rgba(0,0,0,0.6);padding:10px 12px;border-radius:8px;color:#fff;box-shadow:0 8px 30px rgba(0,0,0,0.6);min-width:220px}
    .toast.success{border-left:4px solid #55ffb2}
    .toast.warn{border-left:4px solid #ffd36b}
    .modal{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:9998}
    .modal-inner{background:#071224;padding:12px;border-radius:8px;max-width:90%;max-height:90%;overflow:auto}
    .chart-wrap{height:240px}
    @media (max-width:980px){ .layout{grid-template-columns:1fr} .chart-wrap{height:200px} }
  </style>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="wrap">
    <header>
      <div style="display:flex;align-items:center;gap:12px">
        <a href="weapon.html" class="btn" style="text-decoration:none;color:inherit;padding:6px 10px;border-radius:8px;border:1px solid rgba(255,255,255,0.06);background:rgba(255,255,255,0.02)">← Back</a>
        <div>
          <h1>D - TECT Dashboard</h1>
          <div class="small">Logs, snapshots and analytics</div>
        </div>
      </div>
      <div class="controls">
        <input id="search" placeholder="Search logs (device, reason, sms)">
        <label class="small">From <input id="from" type="date"></label>
        <label class="small">To <input id="to" type="date"></label>
        <select id="deviceFilter"><option value="">All devices</option></select>
        <select id="sortBy">
          <option value="ts_desc">Newest</option>
          <option value="ts_asc">Oldest</option>
          <option value="device_asc">Device A→Z</option>
        </select>
        <select id="perPage"><option>10</option><option>25</option><option>50</option></select>
        <button id="refresh" class="btn">Refresh</button>
        <button id="export" class="btn primary">Export CSV</button>
        <button id="clear" class="btn">Clear</button>
      </div>
    </header>

    <div class="layout">
      <div>
        <div class="panel">
          <div class="muted">Showing <span id="count">0</span> entries</div>

          <table id="tbl" class="table" aria-live="polite">
            <thead>
              <tr>
                <th style="min-width:150px">Timestamp</th>
                <th>Device</th>
                <th style="min-width:120px">SMS</th>
                <th>Sent</th>
                <th>Snapshot</th>
                <th style="min-width:140px">Notes</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>

          <div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px">
            <div class="pagination">
              <button id="prevPage" class="btn">Prev</button>
              <span class="small" id="pageInfo">Page 1</span>
              <button id="nextPage" class="btn">Next</button>
            </div>
            <div>
              <button id="openNotifications" class="btn">Notifications</button>
            </div>
          </div>
        </div>
      </div>

      <aside>
        <div class="panel">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <div style="font-weight:700">Analytics</div>
            <div class="small">range: <span id="chartRange">14d</span></div>
          </div>
          <div class="chart-wrap" style="margin-top:10px">
            <canvas id="chart"></canvas>
          </div>

          <div style="margin-top:10px;display:flex;gap:8px;align-items:center">
            <button id="range7" class="btn">7d</button>
            <button id="range14" class="btn primary">14d</button>
            <button id="range30" class="btn">30d</button>
          </div>

          <div style="margin-top:12px">
            <div style="font-weight:700;margin-bottom:6px">Snapshots</div>
            <div id="thumbs" style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px"></div>
          </div>
        </div>
      </aside>
    </div>
  </div>

  <div class="toast-wrap" id="toastWrap" aria-live="polite"></div>

  <!-- modal viewer -->
  <div id="modal" class="modal" style="display:none">
    <div class="modal-inner">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <div id="modalTitle" style="font-weight:700"></div>
        <button id="closeModal" class="btn">Close</button>
      </div>
      <img id="modalImg" src="" style="max-width:100%;height:auto;border-radius:6px;display:block">
      <pre id="modalMeta" class="small" style="margin-top:8px;color:var(--muted)"></pre>
    </div>
  </div>

<script>
  // Dashboard script: filters, chart, thumbnails, modal, toasts, paging
  const LOG_KEY = 'dtect_logs_v1';
  const SNAP_KEY = 'dtect_snapshots_v1';

  // DOM refs
  const searchEl = document.getElementById('search');
  const fromEl = document.getElementById('from');
  const toEl = document.getElementById('to');
  const deviceFilterEl = document.getElementById('deviceFilter');
  const sortByEl = document.getElementById('sortBy');
  const perPageEl = document.getElementById('perPage');
  const tbody = document.querySelector('#tbl tbody');
  const countEl = document.getElementById('count');
  const prevPageBtn = document.getElementById('prevPage');
  const nextPageBtn = document.getElementById('nextPage');
  const pageInfo = document.getElementById('pageInfo');
  const exportBtn = document.getElementById('export');
  const clearBtn = document.getElementById('clear');
  const refreshBtn = document.getElementById('refresh');
  const chartRangeEl = document.getElementById('chartRange');
  const range7 = document.getElementById('range7');
  const range14 = document.getElementById('range14');
  const range30 = document.getElementById('range30');
  const thumbsEl = document.getElementById('thumbs');
  const toastWrap = document.getElementById('toastWrap');
  const modal = document.getElementById('modal');
  const modalImg = document.getElementById('modalImg');
  const modalTitle = document.getElementById('modalTitle');
  const modalMeta = document.getElementById('modalMeta');
  const openNotifications = document.getElementById('openNotifications');

  // state
  let logs = [];
  let snaps = [];
  let filtered = [];
  let currentPage = 1;
  let perPage = parseInt(perPageEl.value,10) || 10;
  let lastLogCount = 0;
  let chart = null;
  let chartDays = 14;

  // load helpers
  function loadLogs(){ try{ const raw = localStorage.getItem(LOG_KEY); return raw?JSON.parse(raw):[] }catch(e){return[]} }
  function loadSnaps(){ try{ const raw = localStorage.getItem(SNAP_KEY); return raw?JSON.parse(raw):[] }catch(e){return[]} }

  // formatting
  function fmtTs(ts){ try{ return new Date(ts).toLocaleString(); }catch(e){ return ts; } }

  // filtering / sorting / pagination
  function applyFilters(){
    logs = loadLogs();
    snaps = loadSnaps();
    const q = (searchEl.value||'').trim().toLowerCase();
    const dev = deviceFilterEl.value;
    const from = fromEl.value ? new Date(fromEl.value) : null;
    const to = toEl.value ? new Date(toEl.value+'T23:59:59') : null;

    filtered = logs.filter(l=>{
      if(dev && (l.device||'') !== dev) return false;
      if(from || to){
        const t = l.ts ? new Date(l.ts) : new Date();
        if(from && t < from) return false;
        if(to && t > to) return false;
      }
      if(!q) return true;
      return JSON.stringify(l).toLowerCase().includes(q);
    });

    // sort
    const sort = sortByEl.value;
    filtered.sort((a,b)=>{
      if(sort === 'ts_desc') return (b.ts||'').localeCompare(a.ts||'');
      if(sort === 'ts_asc') return (a.ts||'').localeCompare(b.ts||'');
      if(sort === 'device_asc') return (a.device||'').localeCompare(b.device||'');
      return 0;
    });

    // reset page if out of range
    perPage = parseInt(perPageEl.value,10) || 10;
    const pages = Math.max(1, Math.ceil(filtered.length / perPage));
    if(currentPage > pages) currentPage = pages;
  }

  function renderTable(){
    applyFilters();
    const start = (currentPage-1)*perPage;
    const pageItems = filtered.slice(start, start+perPage);
    tbody.innerHTML = '';
    pageItems.forEach(l=>{
      const tr = document.createElement('tr');
      const snapKey = l.snapshotKey || '';
      const snapObj = snaps.find(s=>s.ts===snapKey);
      const thumbHtml = snapObj ? `<img class="thumb" src="${snapObj.data}" alt="snapshot">` : '<div class="small muted">—</div>';
      tr.innerHTML = `
        <td>${fmtTs(l.ts||'')}</td>
        <td>${l.device||'N/A'}</td>
        <td>${l.smsAttempted? 'Yes' : 'No'}</td>
        <td>${l.smsSent? 'Yes' : 'No'}</td>
        <td>${snapObj ? '<button class="view-btn btn">View</button>' : thumbHtml}</td>
        <td>${(l.smsReason||'') + (l.error ? ' • ' + l.error : '')}</td>
      `;
      // attach view handler if snapshot
      if(snapObj){
        tr.querySelector('.view-btn').addEventListener('click', ()=>{
          openModal(snapObj.data, l);
        });
      }
      tbody.appendChild(tr);
    });

    // update counts and page info
    document.getElementById('count').textContent = filtered.length;
    const pages = Math.max(1, Math.ceil(filtered.length / perPage));
    pageInfo.textContent = `Page ${currentPage} / ${pages}`;
  }

  // chart: counts per day for last N days
  function renderChart(){
    const dataMap = new Map();
    const days = chartDays;
    const today = new Date();
    for(let i=days-1;i>=0;i--){
      const d = new Date(today); d.setDate(today.getDate()-i);
      const key = d.toISOString().slice(0,10);
      dataMap.set(key, 0);
    }
    logs.forEach(l=>{
      const k = (l.ts||'').slice(0,10);
      if(dataMap.has(k)) dataMap.set(k, dataMap.get(k)+1);
    });
    const labels = Array.from(dataMap.keys());
    const values = Array.from(dataMap.values());

    const ctx = document.getElementById('chart').getContext('2d');
    if(chart) chart.destroy();
    chart = new Chart(ctx, {
      type: 'bar',
      data: { labels, datasets: [{ label: 'Detections', data: values, backgroundColor: 'rgba(0,212,255,0.85)' }] },
      options:{ responsive:true, maintainAspectRatio:false, scales:{ y:{ beginAtZero:true } } }
    });

    chartRangeEl.textContent = `${days}d`;
  }

  // thumbnails panel
  function renderThumbs(){
    thumbsEl.innerHTML = '';
    const recent = snaps.slice(0,4);
    recent.forEach(s=>{
      const d = document.createElement('div');
      d.style.cursor = 'pointer';
      d.innerHTML = `<img src="${s.data}" class="thumb"><div class="small muted" style="margin-top:6px">${new Date(s.ts).toLocaleString()}</div>`;
      d.addEventListener('click', ()=> openModal(s.data, {ts:s.ts}));
      thumbsEl.appendChild(d);
    });
    if(recent.length===0) thumbsEl.innerHTML = '<div class="small muted">No snapshots</div>';
  }

  // modal viewer
  function openModal(src, meta){
    modalImg.src = src;
    modalTitle.textContent = `Snapshot — ${meta.device || ''} ${meta.ts?(' @ '+new Date(meta.ts).toLocaleString()):''}`;
    modalMeta.textContent = JSON.stringify(meta,null,2);
    modal.style.display = 'flex';
  }
  document.getElementById('closeModal').addEventListener('click', ()=> modal.style.display='none');
  modal.addEventListener('click', (e)=>{ if(e.target===modal) modal.style.display='none' });

  // toasts / notifications
  function showToast(text, type='info', ttl=6000){
    const t = document.createElement('div');
    t.className = 'toast ' + (type==='success'? 'success' : (type==='warn' ? 'warn' : ''));
    t.textContent = text;
    toastWrap.appendChild(t);
    setTimeout(()=>{ t.style.opacity=0; setTimeout(()=>t.remove(),400); }, ttl);
  }

  // export CSV
  function exportCSV(){
    const logsAll = loadLogs();
    if(!logsAll.length) return showToast('No logs to export','warn',4000);
    const header = ['ts','device','event','smsAttempted','smsSent','smsReason','snapshotKey'];
    const rows = [header.join(',')];
    logsAll.forEach(l=>{
      rows.push([
        `"${l.ts||''}"`,
        `"${(l.device||'')}"`,
        `"${(l.event||'')}"`,
        l.smsAttempted?1:0,
        l.smsSent?1:0,
        `"${(l.smsReason||'')}"`,
        `"${(l.snapshotKey||'')}"`].join(','));
    });
    const blob = new Blob([rows.join('\n')], {type:'text/csv'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href=url; a.download='dtect_logs.csv'; a.click();
    setTimeout(()=>URL.revokeObjectURL(url),2000);
    showToast('Export started','success',3000);
  }

  // clear logs
  function clearLogs(){
    if(!confirm('Clear all logs and snapshots?')) return;
    localStorage.removeItem(LOG_KEY);
    localStorage.removeItem(SNAP_KEY);
    loadAndRender();
    showToast('Logs cleared','warn',3000);
  }

  // device filter populate
  function populateDeviceFilter(){
    const devSet = new Set(loadLogs().map(l=>l.device).filter(Boolean));
    deviceFilterEl.innerHTML = '<option value="">All devices</option>';
    Array.from(devSet).sort().forEach(d=>{
      const o = document.createElement('option'); o.value=d; o.textContent=d; deviceFilterEl.appendChild(o);
    });
  }

  // polling for new logs (and toast notifications for SMS events)
  function startPolling(){
    setInterval(()=>{
      const current = loadLogs();
      if(current.length > lastLogCount){
        const delta = current.slice(0, Math.min(5, current.length - lastLogCount));
        delta.forEach(l=>{
          // notify for sms events or high priority
          if(l.smsAttempted && l.smsSent) showToast(`SMS sent (${l.device||'N/A'})`,'success',4000);
          else if(l.smsAttempted && !l.smsSent) showToast(`SMS failed (${l.device||'N/A'})`,'warn',5000);
          else showToast(`Detection: ${l.device||'N/A'}`,'info',3500);
        });
        lastLogCount = current.length;
        loadAndRender(false);
      } else if(current.length < lastLogCount){
        // logs were cleared elsewhere
        lastLogCount = current.length;
        loadAndRender(false);
      }
    }, 2500);
  }

  // load everything and render UI sections
  function loadAndRender(resetPage=true){
    logs = loadLogs();
    snaps = loadSnaps();
    populateDeviceFilter();
    if(resetPage) currentPage = 1;
    renderTable();
    renderChart();
    renderThumbs();
    lastLogCount = logs.length;
  }

  // event wiring
  refreshBtn.addEventListener('click', ()=> loadAndRender());
  exportBtn.addEventListener('click', exportCSV);
  clearBtn.addEventListener('click', clearLogs);
  searchEl.addEventListener('input', ()=> { currentPage=1; renderTable(); });
  deviceFilterEl.addEventListener('change', ()=> { currentPage=1; renderTable(); });
  sortByEl.addEventListener('change', ()=> { currentPage=1; renderTable(); });
  perPageEl.addEventListener('change', ()=> { currentPage=1; renderTable(); });
  prevPageBtn.addEventListener('click', ()=> { if(currentPage>1) currentPage--; renderTable(); });
  nextPageBtn.addEventListener('click', ()=> { currentPage++; renderTable(); });
  range7.addEventListener('click', ()=> { chartDays=7; renderChart(); range7.classList.add('primary'); range14.classList.remove('primary'); range30.classList.remove('primary'); });
  range14.addEventListener('click', ()=> { chartDays=14; renderChart(); range14.classList.add('primary'); range7.classList.remove('primary'); range30.classList.remove('primary'); });
  range30.addEventListener('click', ()=> { chartDays=30; renderChart(); range30.classList.add('primary'); range7.classList.remove('primary'); range14.classList.remove('primary'); });

  // notifications panel (simple)
  openNotifications.addEventListener('click', ()=>{
    const recent = loadLogs().slice(0,10);
    if(recent.length===0) return showToast('No notifications','info',2500);
    recent.forEach(r=>{
      showToast(`${r.device||'N/A'} — ${r.smsSent? 'SMS sent':'SMS not sent'}`, r.smsSent? 'success':'warn', 3500);
    });
  });

  // initial load
  loadAndRender();
  startPolling();

  // expose helper for other pages if needed
  window.dashboard = {
    notify: (msg, type='info')=> showToast(msg,type,5000),
    refresh: ()=> loadAndRender()
  };

</script>
</body>
</html>
